<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Dashboard | UniEvent Portal</title>
    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Outfit:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --sidebar-width: 280px;
        }

        .student-layout {
            display: grid;
            grid-template-columns: var(--sidebar-width) 1fr;
            min-height: 100vh;
            background: #f8fafc;
        }

        .student-sidebar {
            background: white;
            border-right: 1px solid var(--glass-border);
            padding: 2rem 1.5rem;
            position: sticky;
            top: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .student-main {
            padding: 2rem 3rem;
            max-width: 1400px;
        }

        .sidebar-nav {
            margin-top: 2rem;
            flex: 1;
        }

        .nav-link {
            display: flex;
            align-items: center;
            gap: 1rem;
            padding: 0.875rem 1.25rem;
            color: var(--text-muted);
            text-decoration: none;
            border-radius: 12px;
            margin-bottom: 0.5rem;
            font-weight: 500;
            transition: var(--transition);
        }

        .nav-link:hover, .nav-link.active {
            background: rgba(79, 70, 229, 0.08);
            color: var(--primary);
        }

        .nav-link i {
            width: 20px;
            font-size: 1.1rem;
        }

        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 3rem;
        }

        .search-box {
            position: relative;
            width: 400px;
        }

        .search-box i {
            position: absolute;
            left: 1rem;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
        }

        .search-box input {
            padding-left: 3rem;
        }

        .dashboard-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 2rem;
        }

        .stats-row {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 1.5rem;
            margin-bottom: 2rem;
        }

        .stat-card-light {
            background: white;
            padding: 1.5rem;
            border-radius: 20px;
            border: 1px solid var(--glass-border);
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .stat-icon {
            width: 48px;
            height: 48px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.25rem;
        }

        .stat-info .label { color: var(--text-muted); font-size: 0.875rem; }
        .stat-info .value { font-size: 1.5rem; font-weight: 700; color: var(--text-main); }

        .recommended-section {
            margin-top: 3rem;
        }

        .card-row {
            display: flex;
            gap: 1.5rem;
            overflow-x: auto;
            padding: 1rem 0;
            scrollbar-width: none;
        }
        .card-row::-webkit-scrollbar { display: none; }

        .event-card-compact {
            min-width: 300px;
            background: white;
            border-radius: 20px;
            overflow: hidden;
            border: 1px solid var(--glass-border);
            transition: var(--transition);
        }

        .event-card-compact:hover {
            transform: translateY(-5px);
            box-shadow: var(--shadow-lg);
        }

        .card-img {
            height: 160px;
            background-size: cover;
            background-position: center;
        }

        .card-body {
            padding: 1.25rem;
        }

        .profile-footer {
            margin-top: auto;
            display: flex;
            align-items: center;
            gap: 1rem;
            padding-top: 2rem;
            border-top: 1px solid var(--glass-border);
        }

        .avatar {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background: var(--primary);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
        }
    </style>
</head>
<body class="light-theme">
    <div class="student-layout">
        <!-- Sidebar -->
        <aside class="student-sidebar">
            <a href="/" class="logo" style="margin-left: 1.25rem;">UniEvent</a>
            
            <nav class="sidebar-nav">
                <a href="/student/dashboard.html" class="nav-link active">
                    <i class="fas fa-th-large"></i> Dashboard
                </a>
                <a href="/student/events.html" class="nav-link">
                    <i class="fas fa-search"></i> Browse Events
                </a>
                <a href="/student/my-registrations.html" class="nav-link">
                    <i class="fas fa-ticket-alt"></i> My Registrations
                </a>
                <a href="/student/certificates.html" class="nav-link">
                    <i class="fas fa-certificate"></i> Certificates
                </a>
                <a href="/student/recommendations.html" class="nav-link">
                    <i class="fas fa-magic"></i> AI Recommendations
                </a>
            </nav>
        </aside>

        <!-- Main Content -->
        <main class="student-main">
            <header class="top-bar">
                <div class="search-box">
                    <i class="fas fa-search"></i>
                    <input type="text" class="form-input" placeholder="Search events, workshops, or clubs...">
                </div>
                <div style="display: flex; gap: 1rem; align-items: center;">
                    <a href="/student/notifications.html" class="btn btn-secondary" style="border-radius: 50%; width: 44px; height: 44px; padding: 0; display: flex; align-items: center; justify-content: center;">
                        <i class="fas fa-bell"></i>
                    </a>
                    <a href="/student/profile.html" class="avatar" id="headerAvatar" style="text-decoration: none;">S</a>
                    <a href="#" class="btn btn-secondary" id="headerLogoutBtn" style="border-radius: 50%; width: 44px; height: 44px; padding: 0; display: flex; align-items: center; justify-content: center;" title="Logout">
                        <i class="fas fa-sign-out-alt"></i>
                    </a>
                </div>
            </header>

            <div class="welcome-section fade-in">
                <h1 style="font-size: 2.25rem; font-family: 'Outfit';">Welcome back, <span id="welcomeStudentName">Student</span>! 👋</h1>
                <p style="color: var(--text-muted); margin-top: 0.5rem; margin-bottom: 2.5rem;">Here's a quick look at your campus activity today.</p>
            </div>

            <div class="dashboard-grid fade-in delay-1">
                <div class="left-col">
                    <div class="stats-row">
                        <div class="stat-card-light">
                            <div class="stat-icon" style="background: rgba(79, 70, 229, 0.1); color: var(--primary);">
                                <i class="fas fa-calendar-check"></i>
                            </div>
                            <div class="stat-info">
                                <div class="label">Events Available</div>
                                <div id="statsEventsAvailable" class="value">0</div>
                            </div>
                        </div>
                        <div class="stat-card-light">
                            <div class="stat-icon" style="background: rgba(236, 72, 153, 0.1); color: var(--secondary);">
                                <i class="fas fa-clipboard-list"></i>
                            </div>
                            <div class="stat-info">
                                <div class="label">Registered</div>
                                <div id="statsRegistered" class="value">0</div>
                            </div>
                        </div>
                        <div class="stat-card-light">
                            <div class="stat-icon" style="background: rgba(139, 92, 246, 0.1); color: var(--accent);">
                                <i class="fas fa-clock"></i>
                            </div>
                            <div class="stat-info">
                                <div class="label">Upcoming</div>
                                <div id="statsUpcoming" class="value">0</div>
                            </div>
                        </div>
                    </div>

                    <div class="recommended-section">
                        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem;">
                            <h3 style="display: flex; align-items: center; gap: 0.5rem;"><i class="fas fa-sparkles" style="color: var(--accent);"></i> Recommended for You</h3>
                            <a href="/student/recommendations.html" class="link-primary" style="font-size: 0.875rem;">View all</a>
                        </div>
                        <div class="card-row" id="recommendedEvents">
                            <!-- Populated by JS -->
                        </div>
                    </div>

                    <div style="margin-top: 3rem;">
                        <h3 style="margin-bottom: 1.5rem;">Latest Event Posts</h3>
                        <div id="latestPostsContainer">
                            <!-- Populated by JS -->
                        </div>
                    </div>
                </div>
                <!-- Removed right-col with Event Calendar and Campus Influencer -->
            </div>
        </main>
    </div>

    <script src="/js/student.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            // Initial UI setup
            const user = JSON.parse(localStorage.getItem('user') || '{}');
            const token = localStorage.getItem('token');
            if (!token) window.location.href = '/login.html';

            document.getElementById('welcomeStudentName').textContent = user.fullName || 'Student';
            document.getElementById('headerAvatar').textContent = (user.fullName || 'S').charAt(0);

            const logoutBtn = document.getElementById('headerLogoutBtn');
            if (logoutBtn) {
                logoutBtn.onclick = (e) => {
                    e.preventDefault();
                    localStorage.clear();
                    window.location.href = '/login.html';
                };
            }

            // Fetch Dashboard Data
            try {
                // Fetch recommended events
                const eventsRes = await fetch('/api/public/events');
                const events = await eventsRes.json();
                const recommendedContainer = document.getElementById('recommendedEvents');
                recommendedContainer.innerHTML = events.slice(0, 4).map(event => `
                    <div class="event-card-compact">
                        <div class="card-img" style="background-image: url('${event.imageUrl || 'https://images.unsplash.com/photo-1540575861501-7ad058c64030?w=800&q=80'}')"></div>
                        <div class="card-body">
                            <div class="badge" style="background: rgba(79, 70, 229, 0.1); color: var(--primary); margin-bottom: 0.5rem;">${event.category}</div>
                            <h4 style="margin-bottom: 0.25rem;">${event.title}</h4>
                            <div style="font-size: 0.75rem; color: var(--text-muted); margin-bottom: 1rem;">
                                <i class="fas fa-map-marker-alt"></i> ${event.venue || 'Remote'}
                            </div>
                            <div style="display: flex; justify-content: space-between; align-items: center;">
                                <span style="font-weight: 700; color: var(--primary);">${event.feePerPerson > 0 ? '₹' + event.feePerPerson : 'FREE'}</span>
                                <a href="/student/event-details.html?id=${event.id}" class="btn btn-secondary" style="padding: 0.4rem 0.8rem; font-size: 0.8rem;">Details</a>
                            </div>
                        </div>
                    </div>
                `).join('');

                // Fetch stats (mock for now or add endpoint)
                document.getElementById('statsEventsAvailable').textContent = events.length;
                
                const myRegsRes = await fetch('/api/student/registrations', { headers: { 'Authorization': `Bearer ${token}` } });
                const myRegs = await myRegsRes.json();
                document.getElementById('statsRegistered').textContent = myRegs.length;
                document.getElementById('statsUpcoming').textContent = myRegs.filter(r => r.status === 'APPROVED').length;

                // Fetch latest posts
                const postsRes = await fetch('/api/public/posts');
                const posts = await postsRes.json();
                const postsContainer = document.getElementById('latestPostsContainer');
                if (posts.length === 0) {
                    postsContainer.innerHTML = '<p class="text-muted">No posts available yet.</p>';
                } else {
                    postsContainer.innerHTML = posts.map(post => `
                        <div class="glass" style="padding: 1.5rem; margin-bottom: 1.5rem;">
                            <div style="display: flex; gap: 1rem; align-items: center; margin-bottom: 1rem;">
                                <div class="avatar" style="width: 40px; height: 40px;">${post.eventTitle ? post.eventTitle.charAt(0) : 'P'}</div>
                                <div>
                                    <div style="font-weight: 600; font-size: 0.9rem;">${post.eventTitle}</div>
                                    <div style="font-size: 0.75rem; color: var(--text-muted);">Event Post</div>
                                </div>
                            </div>
                            <p style="font-size: 0.95rem; margin-bottom: 1rem;">${post.description}</p>
                            ${post.imageUrls && post.imageUrls.length > 0 ? `<img src="${post.imageUrls[0]}" alt="post" style="width: 100%; border-radius: 12px; height: 300px; object-fit: cover;">` : ''}
                        </div>
                    `).join('');
                }

            } catch (err) {
                console.error("Error loading dashboard:", err);
            }
        });
    </script>
</body>
</html>
