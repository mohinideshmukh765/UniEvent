<!DOCTYPE html> <html lang="en"> <head>     <meta charset="UTF-8">     <meta name="viewport" content="width=device-width, initial-scale=1.0">     <title>Browse Events | UniEvent Portal</title>     <link rel="stylesheet" href="/css/style.css">     <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">     <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Outfit:wght@400;600;700&display=swap" rel="stylesheet">     <style>         :root { --sidebar-width: 280px; }         .student-layout { display: grid; grid-template-columns: var(--sidebar-width) 1fr; min-height: 100vh; background: #f8fafc; }         .student-sidebar { background: white; border-right: 1px solid var(--glass-border); padding: 2rem 1.5rem; position: sticky; top: 0; height: 100vh; display: flex; flex-direction: column; }         .student-main { padding: 2rem 3rem; }         .sidebar-nav { margin-top: 2rem; flex: 1; }         .nav-link { display: flex; align-items: center; gap: 1rem; padding: 0.875rem 1.25rem; color: var(--text-muted); text-decoration: none; border-radius: 12px; margin-bottom: 0.5rem; font-weight: 500; transition: var(--transition); }         .nav-link:hover, .nav-link.active { background: rgba(79, 70, 229, 0.08); color: var(--primary); }         .nav-link i { width: 20px; font-size: 1.1rem; }         .top-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem; }         .search-box { position: relative; width: 400px; }         .search-box i { position: absolute; left: 1rem; top: 50%; transform: translateY(-50%); color: var(--text-muted); }         .search-box input { padding-left: 3rem; }                  .events-layout { display: grid; grid-template-columns: 280px 1fr; gap: 2.5rem; }         .filters-aside { background: white; padding: 1.5rem; border-radius: 20px; border: 1px solid var(--glass-border); height: fit-content; }         .filter-group { margin-bottom: 1.5rem; }         .filter-group h4 { margin-bottom: 1rem; font-size: 0.85rem; text-transform: uppercase; letter-spacing: 0.05em; color: var(--text-muted); }         .filter-option { display: flex; align-items: center; gap: 0.75rem; margin-bottom: 0.75rem; cursor: pointer; font-size: 0.935rem; }         .filter-option input { width: 18px; height: 18px; border-radius: 4px; border: 2px solid var(--glass-border); cursor: pointer; }                  .events-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 2rem; }         .event-card { background: white; border-radius: 24px; overflow: hidden; border: 1px solid var(--glass-border); transition: var(--transition); }         .event-card:hover { transform: translateY(-8px); box-shadow: var(--shadow-lg); }         .event-card .img-container { height: 200px; background-size: cover; background-position: center; position: relative; }         .event-card .price-tag { position: absolute; top: 1rem; right: 1rem; background: white; padding: 0.4rem 0.8rem; border-radius: 10px; font-weight: 700; color: var(--primary); box-shadow: var(--shadow-sm); }         .event-card .category-tag { position: absolute; top: 1rem; left: 1rem; background: var(--primary); color: white; padding: 0.4rem 0.8rem; border-radius: 10px; font-weight: 600; font-size: 0.75rem; }         .event-card .content { padding: 1.5rem; }                  .profile-footer { margin-top: auto; display: flex; align-items: center; gap: 1rem; padding-top: 2rem; border-top: 1px solid var(--glass-border); }         .avatar { width: 44px; height: 44px; border-radius: 50%; background: var(--primary); color: white; display: flex; align-items: center; justify-content: center; font-weight: 700; }     </style> </head> <body class="light-theme">     <div class="student-layout">         <!-- Sidebar -->         <aside class="student-sidebar">             <a href="/" class="logo" style="margin-left: 1.25rem;">UniEvent</a>                          <nav class="sidebar-nav">                 <a href="/student/dashboard.html" class="nav-link">                     <i class="fas fa-th-large"></i> Dashboard                 </a>                 <a href="/student/events.html" class="nav-link active">                     <i class="fas fa-search"></i> Browse Events                 </a>                 <a href="/student/my-registrations.html" class="nav-link">                     <i class="fas fa-ticket-alt"></i> My Registrations                 </a>                 <a href="/student/certificates.html" class="nav-link">                     <i class="fas fa-certificate"></i> Certificates                 </a>                 <a href="/student/recommendations.html" class="nav-link">                     <i class="fas fa-magic"></i> AI Recommendations                 </a>             </nav>              <div class="profile-footer">                                  <div style="flex: 1;">                     <div class="student-name" style="font-weight: 600; font-size: 0.9rem;">Aryan Sharma</div>                     <div style="font-size: 0.75rem; color: var(--text-muted);">Computer Science</div>                 </div>                 <a href="#" class="logout-btn" style="color: var(--text-muted);"><i class="fas fa-sign-out-alt"></i></a>             </div>         </aside>          <!-- Main Content -->         <main class="student-main">             <header class="top-bar">                 <div class="search-box">                     <i class="fas fa-search"></i>                     <input type="text" class="form-input" placeholder="Search events, workshops, or clubs...">                 </div>                 <div style="display: flex; align-items: center; gap: 1.5rem;">                     <span style="color: var(--text-muted); font-size: 0.9rem;">Sort by: <strong>Earliest First</strong> <i class="fas fa-chevron-down"></i></span>                                          <a href="/student/profile.html" class="avatar" style="width: 44px; height: 44px; text-decoration: none;">AS</a>                 </div>             </header>              <div class="events-layout fade-in">                 <aside class="filters-aside">                     <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem;">                         <h3 style="font-size: 1.1rem;">Filters</h3>                         <a href="#" class="link-primary" style="font-size: 0.8rem;">Clear all</a>                     </div>                      <div class="filter-group">                         <h4>District</h4>                         <label class="filter-option"><input type="checkbox" checked> Kolhapur</label>                         <label class="filter-option"><input type="checkbox"> Sangli</label>                         <label class="filter-option"><input type="checkbox"> Satara</label>                     </div>                      <div class="filter-group">                         <h4>Category</h4>                         <label class="filter-option"><input type="checkbox" value="Hackathon"> Hackathon</label>                         <label class="filter-option"><input type="checkbox" value="Project Competition"> Project Competition</label>                         <label class="filter-option"><input type="checkbox" value="Coding Competition"> Coding Competition</label>                         <label class="filter-option"><input type="checkbox" value="Electrical related"> Electrical related</label>                         <label class="filter-option"><input type="checkbox" value="Civil related"> Civil related</label>                         <label class="filter-option"><input type="checkbox" value="Idea Pitching"> Idea Pitching</label>                         <label class="filter-option"><input type="checkbox" value="Business Competition"> Business Competition</label>                         <label class="filter-option"><input type="checkbox" value="Cultural Competition"> Cultural Competition</label>                         <label class="filter-option"><input type="checkbox" value="Debate Competition"> Debate Competition</label>                         <label class="filter-option"><input type="checkbox" value="Group Discussion"> Group Discussion</label>                         <label class="filter-option"><input type="checkbox" value="Others"> Others</label>                     </div>                      <div class="filter-group">                         <h4>Fee</h4>                         <div style="display: flex; gap: 0.5rem;">                             <button class="btn btn-secondary active" style="flex: 1; padding: 0.5rem;">Free</button>                             <button class="btn btn-secondary" style="flex: 1; padding: 0.5rem;">Paid</button>                         </div>                     </div>                      <div class="filter-group">                         <h4>Event Date</h4>                         <div style="display: flex; gap: 0.5rem; align-items: center;">                             <input type="date" class="form-input" style="flex: 1; padding: 0.5rem; font-size: 0.8rem;" title="From Date">                             <span style="color: var(--text-muted); font-size: 0.85rem;">to</span>                             <input type="date" class="form-input" style="flex: 1; padding: 0.5rem; font-size: 0.8rem;" title="To Date">                         </div>                     </div>                 </aside>                  <div class="events-content">                     <div style="margin-bottom: 2rem;">                         <h2 style="font-family: 'Outfit'; font-size: 2rem;">Explore Events</h2>                         <p style="color: var(--text-muted);">Showing 24 upcoming events in Maharashtra</p>                     </div>                      <div class="events-grid" id="eventsGrid">                         <!-- Populated by JS -->                     </div>                      <!-- Pagination -->                     <div style="margin-top: 4rem; display: flex; justify-content: center; gap: 0.5rem;">                         <button class="btn btn-secondary" style="width: 40px; height: 40px; padding: 0; justify-content: center;"><i class="fas fa-chevron-left"></i></button>                         <button class="btn btn-primary" style="width: 40px; height: 40px; padding: 0; justify-content: center;">1</button>                         <button class="btn btn-secondary" style="width: 40px; height: 40px; padding: 0; justify-content: center;">2</button>                         <button class="btn btn-secondary" style="width: 40px; height: 40px; padding: 0; justify-content: center;">3</button>                         <button class="btn btn-secondary" style="width: 40px; height: 40px; padding: 0; justify-content: center;"><i class="fas fa-chevron-right"></i></button>                     </div>                 </div>             </div>         </main>     </div>      <script src="/js/student.js"></script>     <script>         document.addEventListener('DOMContentLoaded', () => {             const grid = document.getElementById('eventsGrid');             grid.innerHTML = mockEvents.map(event => `                 <div class="event-card">                     <div class="img-container" style="background-image: url('${event.image}')">                         <span class="category-tag">${event.category}</span>                         <span class="price-tag">${event.price}</span>                     </div>                     <div class="content">                         <h3 style="margin-bottom: 0.5rem;">${event.title}</h3>                         <div style="color: var(--text-muted); font-size: 0.9rem; margin-bottom: 1rem;">                             <i class="fas fa-map-marker-alt" style="color: var(--primary);"></i> ${event.college}                         </div>                         <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-bottom: 1.5rem; font-size: 0.85rem;">                             <div>                                 <div style="color: var(--text-muted);">Event Date</div>                                 <div style="font-weight: 600;"><i class="fas fa-calendar"></i> ${event.date}</div>                             </div>                             <div>                                 <div style="color: var(--text-muted);">Deadline</div>                                 <div style="font-weight: 600; color: #ef4444;"><i class="fas fa-clock"></i> ${event.deadline}</div>                             </div>                         </div>                         <a href="/student/event-details.html?id=${event.id}" class="btn btn-primary" style="width: 100%; justify-content: center;">Register Now <i class="fas fa-arrow-right"></i></a>                     </div>                 </div>             `).join('');         });     </script> </body> </html>
