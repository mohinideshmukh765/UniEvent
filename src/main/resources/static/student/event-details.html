<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Event Details | UniEvent Portal</title>
    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Outfit:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --sidebar-width: 280px; }
        .student-layout { display: grid; grid-template-columns: var(--sidebar-width) 1fr; min-height: 100vh; background: #f8fafc; }
        .student-sidebar { background: white; border-right: 1px solid var(--glass-border); padding: 2rem 1.5rem; position: sticky; top: 0; height: 100vh; display: flex; flex-direction: column; }
        .student-main { padding: 2rem 3rem; }
        .nav-link { display: flex; align-items: center; gap: 1rem; padding: 0.875rem 1.25rem; color: var(--text-muted); text-decoration: none; border-radius: 12px; margin-bottom: 0.5rem; font-weight: 500; transition: var(--transition); }
        .nav-link:hover, .nav-link.active { background: rgba(79, 70, 229, 0.08); color: var(--primary); }
        
        .event-header { height: 400px; border-radius: 32px; background-size: cover; background-position: center; position: relative; overflow: hidden; margin-bottom: 3rem; box-shadow: var(--shadow-xl); }
        .header-overlay { position: absolute; inset: 0; background: linear-gradient(to top, rgba(0,0,0,0.8), transparent); display: flex; align-items: flex-end; padding: 3rem; }
        .header-content { color: white; }
        .header-content h1 { font-size: 3rem; font-family: 'Outfit'; margin-bottom: 0.5rem; }
        
        .details-grid { display: grid; grid-template-columns: 2fr 1fr; gap: 3rem; }
        .info-card { background: white; padding: 2.5rem; border-radius: 32px; border: 1px solid var(--glass-border); margin-bottom: 2rem; }
        .section-title { font-size: 1.25rem; font-weight: 700; margin-bottom: 1.5rem; display: flex; align-items: center; gap: 0.75rem; color: var(--text-main); }
        
        .sidebar-card { background: white; padding: 2rem; border-radius: 32px; border: 1px solid var(--glass-border); position: sticky; top: 2rem; }
        .info-row { display: flex; gap: 1rem; margin-bottom: 1.5rem; align-items: flex-start; }
        .info-row i { color: var(--primary); font-size: 1.1rem; margin-top: 0.2rem; }
        .info-row .label { font-size: 0.8rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.05em; }
        .info-row .val { font-weight: 600; color: var(--text-main); }
        
        .profile-footer { margin-top: auto; display: flex; align-items: center; gap: 1rem; padding-top: 2rem; border-top: 1px solid var(--glass-border); }
        .avatar { width: 44px; height: 44px; border-radius: 50%; background: var(--primary); color: white; display: flex; align-items: center; justify-content: center; font-weight: 700; }
    </style>
</head>
<body class="light-theme">
    <div class="student-layout">
        <aside class="student-sidebar">
            <a href="/" class="logo" style="margin-left: 1.25rem;">UniEvent</a>
            <nav class="sidebar-nav" style="margin-top: 2rem; flex: 1;">
                <a href="/student/dashboard.html" class="nav-link"><i class="fas fa-th-large"></i> Dashboard</a>
                <a href="/student/events.html" class="nav-link active"><i class="fas fa-search"></i> Browse Events</a>
                <a href="/student/my-registrations.html" class="nav-link"><i class="fas fa-ticket-alt"></i> My Registrations</a>
                <a href="/student/results.html" class="nav-link"><i class="fas fa-award"></i> Results</a>
                <a href="/student/gallery.html" class="nav-link"><i class="fas fa-images"></i> Gallery</a>
                <a href="/student/notifications.html" class="nav-link"><i class="fas fa-bell"></i> Notifications</a>
                <a href="/student/profile.html" class="nav-link"><i class="fas fa-user"></i> Profile</a>
                <a href="/student/certificates.html" class="nav-link"><i class="fas fa-certificate"></i> Certificates</a>
                <a href="/student/recommendations.html" class="nav-link"><i class="fas fa-magic"></i> AI Recommendations</a>
            </nav>
            <div class="profile-footer">
                <div class="avatar">AS</div>
                <div style="flex: 1;">
                    <div class="student-name" style="font-weight: 600; font-size: 0.9rem;">Aryan Sharma</div>
                    <div style="font-size: 0.75rem; color: var(--text-muted);">Computer Science</div>
                </div>
                <a href="#" class="logout-btn" style="color: var(--text-muted);"><i class="fas fa-sign-out-alt"></i></a>
            </div>
        </aside>

        <main class="student-main">
            <div id="eventDetailsContainer" class="fade-in">
                <!-- Populated by JS -->
            </div>
        </main>
    </div>

    <script src="/js/student.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const urlParams = new URLSearchParams(window.location.search);
            const eventId = urlParams.get('id');
            const event = mockEvents.find(e => e.id == eventId) || mockEvents[0];

            const container = document.getElementById('eventDetailsContainer');
            container.innerHTML = `
                <div class="event-header" style="background-image: url('${event.image}')">
                    <div class="header-overlay">
                        <div class="header-content">
                            <div class="badge" style="background: var(--primary); color: white; margin-bottom: 1rem;">${event.category}</div>
                            <h1>${event.title}</h1>
                            <p style="font-size: 1.1rem; opacity: 0.9;"><i class="fas fa-university"></i> ${event.college}</p>
                        </div>
                    </div>
                </div>

                <div class="details-grid">
                    <div class="left-col">
                        <div class="info-card">
                            <h3 class="section-title"><i class="fas fa-align-left"></i> About the Event</h3>
                            <p style="line-height: 1.8; color: var(--text-muted);">
                                Experience one of the most prestigious university events in the ${event.district} district. 
                                This event brings together students from various disciplines to showcase their talents, 
                                network with peers, and learn from industry experts. 
                                <br><br>
                                Whether you're here to compete, learn, or simply enjoy the vibes, ${event.title} 
                                promises an unforgettable experience filled with innovation, culture, and sportsmanship.
                            </p>
                        </div>

                        <div class="info-card">
                            <h3 class="section-title"><i class="fas fa-list-check"></i> Rules & Guidelines</h3>
                            <ul style="color: var(--text-muted); line-height: 2; padding-left: 1.2rem;">
                                <li>Valid University ID card is mandatory for all participants.</li>
                                <li>Pre-registration is required via this portal.</li>
                                <li>Teams must report at least 30 minutes before the scheduled time.</li>
                                <li>Decision of the judges/coordinators will be final and binding.</li>
                                <li>Code of conduct must be maintained throughout the event.</li>
                            </ul>
                        </div>

                        <div class="info-card">
                            <h3 class="section-title"><i class="fas fa-users"></i> Eligibility</h3>
                            <p style="color: var(--text-muted);">Open to all currently enrolled undergraduate and postgraduate students of affiliated colleges in ${event.district}.</p>
                        </div>
                    </div>

                    <div class="right-col">
                        <div class="sidebar-card">
                            <div class="info-row">
                                <i class="fas fa-calendar-day"></i>
                                <div>
                                    <div class="label">Date & Time</div>
                                    <div class="val">${event.date} • 10:00 AM</div>
                                </div>
                            </div>
                            <div class="info-row">
                                <i class="fas fa-map-marker-alt"></i>
                                <div>
                                    <div class="label">Venue</div>
                                    <div class="val">${event.district} Main Campus</div>
                                </div>
                            </div>
                            <div class="info-row">
                                <i class="fas fa-hourglass-end"></i>
                                <div>
                                    <div class="label">Reg. Deadline</div>
                                    <div class="val" style="color: #ef4444;">${event.deadline} Oct, 2024</div>
                                </div>
                            </div>
                            <div class="info-row">
                                <i class="fas fa-chair"></i>
                                <div>
                                    <div class="label">Available Seats</div>
                                    <div class="val">120 / 200</div>
                                </div>
                            </div>

                            <div style="background: var(--bg-soft); padding: 1.5rem; border-radius: 20px; text-align: center; margin: 2rem 0;">
                                <div style="font-size: 0.8rem; color: var(--text-muted); margin-bottom: 0.25rem;">Registration Fee</div>
                                <div style="font-size: 1.75rem; font-weight: 800; color: var(--primary);">${event.price}</div>
                            </div>

                            <a href="/student/registration.html?id=${event.id}" class="btn btn-primary" style="width: 100%; justify-content: center; font-size: 1.1rem; padding: 1rem;">Register Now</a>
                            
                            <div style="display: flex; gap: 1rem; margin-top: 1rem;">
                                <button class="btn btn-secondary" style="flex: 1; justify-content: center;"><i class="fas fa-share-alt"></i></button>
                                <button class="btn btn-secondary" style="flex: 1; justify-content: center;"><i class="fas fa-comment-dots"></i></button>
                            </div>
                        </div>
                    </div>
                </div>
            `;
        });
    </script>
</body>
</html>
