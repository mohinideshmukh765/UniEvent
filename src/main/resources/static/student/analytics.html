<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Analytics | UniEvent Portal</title>
    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Outfit:wght@400;600;700&display=swap"
        rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --sidebar-width: 280px;
        }

        .student-layout {
            display: grid;
            grid-template-columns: var(--sidebar-width) 1fr;
            min-height: 100vh;
            background: #f8fafc;
        }

        .student-sidebar {
            background: white;
            border-right: 1px solid var(--glass-border);
            padding: 2rem 1.5rem;
            position: sticky;
            top: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .student-main {
            padding: 2rem 3rem;
        }

        .nav-link {
            display: flex;
            align-items: center;
            gap: 1rem;
            padding: 0.875rem 1.25rem;
            color: var(--text-muted);
            text-decoration: none;
            border-radius: 12px;
            margin-bottom: 0.5rem;
            font-weight: 500;
            transition: var(--transition);
        }

        .nav-link:hover,
        .nav-link.active {
            background: rgba(79, 70, 229, 0.08);
            color: var(--primary);
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 1.5rem;
            margin-bottom: 2rem;
        }

        .stat-card {
            background: white;
            padding: 1.5rem;
            border-radius: 20px;
            border: 1px solid var(--glass-border);
            display: flex;
            align-items: center;
            gap: 1.25rem;
        }

        .stat-icon {
            width: 48px;
            height: 48px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.25rem;
        }

        .filter-bar {
            background: white;
            padding: 1.5rem;
            border-radius: 20px;
            border: 1px solid var(--glass-border);
            margin-bottom: 2rem;
            display: flex;
            gap: 1.5rem;
            align-items: flex-end;
            flex-wrap: wrap;
        }

        .filter-group {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
            flex: 1;
            min-width: 200px;
        }

        .filter-label {
            font-size: 0.8rem;
            font-weight: 600;
            color: var(--text-muted);
            text-transform: uppercase;
        }

        .chart-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1.5rem;
        }

        .chart-card {
            background: white;
            padding: 2rem;
            border-radius: 24px;
            border: 1px solid var(--glass-border);
            box-shadow: var(--shadow-sm);
        }

        .chart-card h3 {
            margin-bottom: 1.5rem;
            font-family: 'Outfit';
            font-size: 1.25rem;
        }

        .full-width {
            grid-column: span 2;
        }

        .profile-footer {
            margin-top: auto;
            display: flex;
            align-items: center;
            gap: 1rem;
            padding-top: 2rem;
            border-top: 1px solid var(--glass-border);
        }

        .avatar {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background: var(--primary);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
        }
    </style>
</head>

<body class="light-theme">
    <div class="student-layout">
        <aside class="student-sidebar">
            <a href="/" class="logo" style="margin-left: 1.25rem;">UniEvent</a>
            <nav class="sidebar-nav" style="margin-top: 2rem; flex: 1;">
                <a href="/student/dashboard.html" class="nav-link"><i class="fas fa-th-large"></i> Dashboard</a>
                <a href="/student/events.html" class="nav-link"><i class="fas fa-search"></i> Browse Events</a>
                <a href="/student/my-registrations.html" class="nav-link"><i class="fas fa-ticket-alt"></i> My
                    Registrations</a>
                <a href="/student/analytics.html" class="nav-link active"><i class="fas fa-chart-pie"></i> Analytics</a>
            </nav>
            <div class="profile-footer">
                <div class="avatar" id="sidebarAvatar">S</div>
                <div style="flex: 1;">
                    <div class="student-name" id="sidebarName" style="font-weight: 600; font-size: 0.9rem;">Student Name
                    </div>
                    <div style="font-size: 0.75rem; color: var(--text-muted);">View Profile</div>
                </div>
                <a href="#" class="logout-btn" style="color: var(--text-muted);"><i class="fas fa-sign-out-alt"></i></a>
            </div>
        </aside>

        <main class="student-main">
            <header class="top-bar" style="margin-bottom: 2rem;">
                <h1 style="font-family: 'Outfit'; font-size: 2.25rem;">Participation Analytics</h1>
                <p style="color: var(--text-muted); margin-top: 0.5rem;">Visualize your engagement and growth across
                    university events.</p>
            </header>

            <!-- Stats cards removed as per user request -->

            <div class="filter-bar fade-in">
                <div class="filter-group">
                    <label class="filter-label">District</label>
                    <select id="filterDistrict" class="form-input">
                        <option value="all">All Districts</option>
                        <option value="Kolhapur">Kolhapur</option>
                        <option value="Sangli">Sangli</option>
                        <option value="Satara">Satara</option>
                    </select>
                </div>
                <div class="filter-group">
                    <label class="filter-label">Category</label>
                    <select id="filterCategory" class="form-input">
                        <option value="all">All Categories</option>
                        <option>Technical</option>
                        <option>Cultural</option>
                        <option>Sports</option>
                        <option>Workshop</option>
                        <option>Hackathon</option>
                        <option>Project Competition</option>
                        <option>Coding Competition</option>
                        <option>Electrical related</option>
                        <option>Civil related</option>
                        <option>Idea Pitching</option>
                        <option>Business Competition</option>
                        <option>Debate Competition</option>
                        <option>Group Discussion</option>
                        <option>Seminar/Webinar</option>
                        <option>Others</option>
                    </select>
                </div>
                <div class="filter-group" style="flex: 2;">
                    <label class="filter-label">Date Range</label>
                    <div style="display: flex; gap: 0.5rem; align-items: center;">
                        <input type="date" id="filterStart" class="form-input">
                        <span style="color: var(--text-muted);">to</span>
                        <input type="date" id="filterEnd" class="form-input">
                    </div>
                </div>
                <button id="resetFilters" class="btn btn-secondary" style="height: 42px;"><i
                        class="fas fa-undo"></i></button>
            </div>

            <div class="chart-grid fade-in delay-1">
                <div class="chart-card full-width">
                    <h3>Participation Timeline</h3>
                    <div style="height: 300px;"><canvas id="timelineChart"></canvas></div>
                </div>
                <div class="chart-card">
                    <h3>Participation by District</h3>
                    <div style="height: 300px;"><canvas id="districtChart"></canvas></div>
                </div>
                <div class="chart-card">
                    <h3>Participation by Category</h3>
                    <div style="height: 300px;"><canvas id="categoryChart"></canvas></div>
                </div>
            </div>
        </main>
    </div>

    <script src="/js/student.js"></script>
    <script>
        let registrations = [];
        let filteredRegistrations = [];
        let charts = {};

        document.addEventListener('DOMContentLoaded', async () => {
            const user = JSON.parse(localStorage.getItem('user'));
            const token = localStorage.getItem('token');
            if (!token) window.location.href = '/login.html';

            document.getElementById('sidebarName').textContent = user.fullName || user.username;
            document.getElementById('sidebarAvatar').textContent = (user.fullName || 'S').charAt(0);

            await fetchData();
            initFilters();
            updateDashboard();

            // Filter event listeners
            document.getElementById('filterDistrict').addEventListener('change', updateDashboard);
            document.getElementById('filterCategory').addEventListener('change', updateDashboard);
            document.getElementById('filterStart').addEventListener('change', updateDashboard);
            document.getElementById('filterEnd').addEventListener('change', updateDashboard);
            document.getElementById('resetFilters').addEventListener('click', () => {
                document.getElementById('filterDistrict').value = 'all';
                document.getElementById('filterCategory').value = 'all';
                document.getElementById('filterStart').value = '';
                document.getElementById('filterEnd').value = '';
                updateDashboard();
            });
        });

        async function fetchData() {
            const token = localStorage.getItem('token');
            try {
                const res = await fetch('/api/student/registrations', {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                registrations = await res.json();
                // Filters are now pre-populated in HTML
            } catch (err) {
                console.error("Error fetching analytics data:", err);
            }
        }

        function filterData() {
            const district = document.getElementById('filterDistrict').value;
            const category = document.getElementById('filterCategory').value;
            const start = document.getElementById('filterStart').value;
            const end = document.getElementById('filterEnd').value;

            filteredRegistrations = registrations.filter(r => {
                const matchDistrict = district === 'all' || r.district === district;
                const matchCategory = category === 'all' || r.category === category;

                let matchDate = true;
                if (start || end) {
                    const regDate = new Date(r.registrationDate);
                    if (start && regDate < new Date(start)) matchDate = false;
                    if (end && regDate > new Date(end)) matchDate = false;
                }

                return matchDistrict && matchCategory && matchDate;
            });
        }

        function updateDashboard() {
            filterData();

            // Timeline Chart
            renderTimelineChart();
            renderDistrictChart();
            renderCategoryChart();
        }

        function renderTimelineChart() {
            const ctx = document.getElementById('timelineChart').getContext('2d');
            if (charts.timeline) charts.timeline.destroy();

            // Group by month
            const monthCounts = filteredRegistrations.reduce((acc, r) => {
                const date = new Date(r.registrationDate);
                const month = date.toLocaleString('default', { month: 'short', year: '2-digit' });
                acc[month] = (acc[month] || 0) + 1;
                return acc;
            }, {});

            const labels = Object.keys(monthCounts);
            const data = Object.values(monthCounts);

            charts.timeline = new Chart(ctx, {
                type: 'line',
                data: {
                    labels,
                    datasets: [{
                        label: 'Registrations',
                        data,
                        borderColor: '#4f46e5',
                        backgroundColor: 'rgba(79, 70, 229, 0.1)',
                        fill: true,
                        tension: 0.4
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { legend: { display: false } },
                    scales: { y: { beginAtZero: true, ticks: { stepSize: 1 } } }
                }
            });
        }

        function renderDistrictChart() {
            const ctx = document.getElementById('districtChart').getContext('2d');
            if (charts.district) charts.district.destroy();

            const districtCounts = filteredRegistrations.reduce((acc, r) => {
                const d = r.district || 'Unknown';
                acc[d] = (acc[d] || 0) + 1;
                return acc;
            }, {});

            charts.district = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: Object.keys(districtCounts),
                    datasets: [{
                        data: Object.values(districtCounts),
                        backgroundColor: '#6366f1',
                        borderRadius: 8
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { legend: { display: false } },
                    scales: { y: { beginAtZero: true, ticks: { stepSize: 1 } } }
                }
            });
        }

        function renderCategoryChart() {
            const ctx = document.getElementById('categoryChart').getContext('2d');
            if (charts.category) charts.category.destroy();

            const categoryCounts = filteredRegistrations.reduce((acc, r) => {
                const c = r.category || 'Other';
                acc[c] = (acc[c] || 0) + 1;
                return acc;
            }, {});

            charts.category = new Chart(ctx, {
                type: 'doughnut',
                data: {
                    labels: Object.keys(categoryCounts),
                    datasets: [{
                        data: Object.values(categoryCounts),
                        backgroundColor: ['#4f46e5', '#ec4899', '#10b981', '#f59e0b', '#3b82f6', '#8b5cf6']
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { legend: { position: 'bottom' } }
                }
            });
        }
    </script>
</body>

</html>
