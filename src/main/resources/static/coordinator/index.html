<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coordinator Dashboard | UniEvent</title>
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="/css/coordinator.css">
</head>

<body>
    <!-- Sidebar -->
    <aside class="sidebar">
        <a href="#" class="sidebar-logo">
            <i class="fas fa-university"></i>
            <span>UniEvent</span>
        </a>

        <ul class="nav-menu">
            <li class="nav-item">
                <a href="#" class="nav-link active" data-page="dashboard">
                    <i class="fas fa-th-large"></i> <span>Dashboard</span>
                </a>
            </li>
            <li class="nav-item">
                <a href="#" class="nav-link" data-page="create-event">
                    <i class="fas fa-calendar-plus"></i> <span>Create Event</span>
                </a>
            </li>
            <li class="nav-item">
                <a href="#" class="nav-link" data-page="manage-events">
                    <i class="fas fa-tasks"></i> <span>Manage Events</span>
                </a>
            </li>
            <li class="nav-item">
                <a href="#" class="nav-link" data-page="posts">
                    <i class="fas fa-paper-plane"></i> <span>Posts</span>
                </a>
            </li>
            <li class="nav-item">
                <a href="#" class="nav-link" data-page="notifications">
                    <i class="fas fa-bell"></i> <span>Notifications</span>
                </a>
            </li>
            <li class="nav-item">
                <a href="#" class="nav-link" data-page="statistics">
                    <i class="fas fa-chart-line"></i> <span>Statistics</span>
                </a>
            </li>
            <li class="nav-item">
                <a href="#" class="nav-link" data-page="profile">
                    <i class="fas fa-user-graduate"></i> <span>Profile</span>
                </a>
            </li>
        </ul>

        <div class="sidebar-footer" style="padding-top: 2rem; border-top: 1px solid var(--border-color);">
            <button id="logoutBtn" class="nav-link"
                style="width: 100%; border: none; background: none; cursor: pointer; color: #ef4444;">
                <i class="fas fa-sign-out-alt"></i> <span>Logout</span>
            </button>
        </div>
    </aside>

    <!-- Main Content -->
    <main class="main-wrapper">
        <header class="topbar">
            <div class="search-box">
                <i class="fas fa-search"></i>
                <input type="text" placeholder="Search events, students...">
            </div>

            <div class="user-profile">
                <div class="user-info">
                    <span class="user-name"><span id="userName"></span></span>
                    <span class="user-role"><span id="userRole"></span></span>
                </div>
                <!-- Placeholder for profile image -->
                <div class="avatar"
                    style="background: var(--primary-light); display: flex; align-items: center; justify-content: center; color: var(--primary-dark); font-weight: bold;">
                    RP
                </div>
            </div>
        </header>

        <section id="contentArea" class="content-body">
            <!-- Dynamic content injected here -->
            <div style="display: flex; justify-content: center; align-items: center; height: 100%;">
                <p>Loading your dashboard...</p>
            </div>
        </section>
    </main>

    <!-- Core Script -->
    <script src="/js/coordinator.js"></script>
</body>

</html>
