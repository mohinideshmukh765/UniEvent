<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coordinator Dashboard | UniEvent Portal</title>
    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="light-theme">
    <div style="display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 2rem;">
        <div class="glass fade-in" style="width: 100%; max-width: 800px; padding: 4rem; text-align: center;">
            <div class="icon-box" style="margin: 0 auto 2rem; width: 80px; height: 80px; font-size: 2.5rem;">
                <i class="fas fa-university"></i>
            </div>
            <h1 style="margin-bottom: 1rem;">Coordinator Dashboard</h1>
            <p style="color: var(--text-muted); margin-bottom: 3rem; font-size: 1.1rem;">
                Welcome to the UniEvent Portal! Your specific tools for managing college events are being prepared.
            </p>
            
            <div class="glass" style="padding: 2rem; background: var(--bg-soft); border-style: dashed; margin-bottom: 3rem;">
                <p style="color: var(--primary); font-weight: 600;">Coming Soon</p>
                <p style="font-size: 0.9rem; color: var(--text-muted);">Event posting, registration tracking, and attendance reports.</p>
            </div>

            <div style="display: flex; gap: 1rem; justify-content: center;">
                <a href="/" class="btn btn-secondary"><i class="fas fa-home"></i> Back to Home</a>
                <button id="logoutBtn" class="btn btn-primary" style="background: #ef4444;">Logout <i class="fas fa-sign-out-alt"></i></button>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('logoutBtn')?.addEventListener('click', () => {
            localStorage.clear();
            window.location.href = '/login.html';
        });

        // Basic session check
        const user = JSON.parse(localStorage.getItem('user'));
        if (!user || !user.roles.includes('ROLE_COORDINATOR')) {
            window.location.href = '/login.html';
        }
    </script>
</body>
</html>
