<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UniEvent Portal | Login</title>
    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="light-theme">
    <div class="container" style="display: flex; justify-content: center; align-items: center; min-height: 100vh;">
        <div class="glass fade-in" style="width: 100%; max-width: 450px; padding: 3rem;">
            <div style="text-align: center; margin-bottom: 2.5rem;">
                <h1 class="logo-text">UniEvent</h1>
                <p style="color: var(--text-muted); margin-top: 0.5rem;">Welcome back! Please login to your account.</p>
            </div>

            <form id="loginForm">
                <div class="form-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" class="form-input" placeholder="Enter your username" required>
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" class="form-input" placeholder="••••••••" required>
                </div>
                
                <button type="submit" class="btn btn-primary" style="width: 100%; justify-content: center; margin-top: 1rem;">
                    Sign In <i class="fas fa-arrow-right"></i>
                </button>
            </form>

            <div style="margin-top: 2rem; text-align: center; font-size: 0.875rem;">
                <p style="color: var(--text-muted);">Don't have an account? <a href="/signup.html" class="link-primary">Sign up</a></p>
                <p style="margin-top: 1rem;"><a href="/" class="link-secondary"><i class="fas fa-home"></i> Back to Home</a></p>
            </div>
            
            <div id="loginMessage" style="margin-top: 1rem; text-align: center; font-size: 0.875rem; display: none;"></div>
        </div>
    </div>

    <script src="/js/auth.js"></script>
</body>
</html>
